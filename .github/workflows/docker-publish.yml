name: Build, Push Docker Image, and Create Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cf-edge-watcher
          tags: |
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./local
          file: ./local/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG: ${{ github.ref_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          gh release create "$IMAGE_TAG" \
            --title "$IMAGE_TAG" \
            --generate-notes \
            --notes "## Docker Image

          \`\`\`bash
          docker pull ${DOCKERHUB_USERNAME}/cf-edge-watcher:${IMAGE_TAG}
          \`\`\`

          ## Docker Compose

          \`\`\`yaml
          services:
            cf-edge-watcher:
              image: ${DOCKERHUB_USERNAME}/cf-edge-watcher:${IMAGE_TAG}
              container_name: cf-edge-watcher
              restart: unless-stopped
              env_file:
                - ./local/.env
              volumes:
                - ./logs:/app/logs
          \`\`\`"