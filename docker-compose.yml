services:
  cf-edge-watcher:
    image: creator1021/cf-edge-watcher:latest
    container_name: cf-edge-watcher
    restart: unless-stopped
    env_file:
     - ./local/.env
    volumes:
      - ./logs:/app/logs  // if you want change me
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"